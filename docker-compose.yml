# OneDrive NAS backup — Docker Compose
#
# Two fully decoupled services:
#   - onedrive-nas: runs only the rclone mirror loop (scripts/orchestrator.sh).
#   - backrest: owns ALL restic operations — backup, retention, and prune —
#     scheduled entirely through its own UI/cron. There is no shared lock or
#     in-process coordination between the two; see README "Caveats" for the
#     concurrency tradeoff and how it's mitigated (per-service resource caps).
#
# Quick start:
#   1. cp .env.example .env   &&   edit .env  (set RESTIC_PASSWORD, DATA_DIR)
#   2. docker compose build
#   3. ./scripts/setup-rclone.sh         (one-time OneDrive auth)
#   4. docker compose up -d
#   5. docker compose logs -f
#   6. Configure Backrest (repo + plan + schedule) per the README — this is
#      the only thing that produces version history now.

services:
  onedrive-nas:
    build:
      context: .
      dockerfile: Dockerfile
    image: onedrive-nas:latest
    container_name: onedrive-nas
    restart: unless-stopped

    # All tunables live in .env (see .env.example).
    env_file:
      - .env

    environment:
      # Path INSIDE the container. Do not usually need changing — the host
      # side is mapped below via DATA_DIR.
      - MIRROR_DIR=/data/mirror
      - TZ=${TZ:-UTC}

    volumes:
      # rclone config (rclone.conf). MUST be read-write: OneDrive refresh
      # tokens are written back here. Losing write access => sync stops.
      - ./config/rclone:/config/rclone

      # The HDD. DATA_DIR on the host holds both the mirror and the restic
      # repo (the repo subdir is unused by this container — backrest owns it).
      # e.g. DATA_DIR=/mnt/hdd/onedrive-nas
      - ${DATA_DIR}:/data

    # rclone reads config from /config/rclone/rclone.conf by default in this
    # image; RCLONE_CONFIG points there explicitly to be safe.

    # Resource caps tuned for a 1 GB Pi. This container only runs rclone now
    # (no more restic prune in-process), so it needs much less headroom than
    # before — the rest of the RAM budget goes to the backrest service.
    mem_limit: ${MEM_LIMIT:-256m}
    memswap_limit: ${MEM_SWAP_LIMIT:-1024m}
    cpus: ${CPU_LIMIT:-1.0}

    healthcheck:
      # Healthy if the mirror directory exists and the process is alive.
      test: ["CMD-SHELL", "test -d /data/mirror && pgrep -f orchestrator.sh >/dev/null || exit 1"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Backrest — owns ALL restic operations: backup, retention, and prune, on
  # its own cron schedule (configured once through the web UI, persisted to
  # backrest-config/config.json). It no longer just browses read-only.
  #
  # After first start, open http://<pi-ip>:9898 and:
  #   1. Create a web UI admin account.
  #   2. Add a repository — URI: /repos/onedrive-nas, Password: RESTIC_PASSWORD
  #      from .env. No extra flags needed; the repo is now mounted read-write.
  #      Set its Forget Policy (retention) and Prune Policy (schedule) here —
  #      both are repository-level settings in current Backrest versions.
  #   3. Add a plan — source path /data/mirror and a cron backup schedule.
  # See README for the full walkthrough.
  # ---------------------------------------------------------------------------
  backrest:
    image: garethgeorge/backrest:latest
    container_name: backrest
    restart: unless-stopped

    # Gives access to RESTIC_PASSWORD as a container env var, purely as a
    # copy-paste convenience during the one-time UI repo setup (Backrest does
    # not read it automatically into the UI's password field).
    env_file:
      - .env

    environment:
      - BACKREST_DATA=/config
      - TZ=${TZ:-UTC}

    volumes:
      # Backrest's own config (stores repo config, schedules, UI settings,
      # and the repo password once entered in the UI).
      - ./backrest-config:/config
      # The restic repo — read-write: Backrest now performs backup/forget/prune.
      - ${DATA_DIR}/restic-repo:/repos/onedrive-nas
      # The live mirror — this is the backup source. Read-only: Backrest only
      # ever needs to read it.
      - ${DATA_DIR}/mirror:/data/mirror:ro

    ports:
      - "9898:9898"

    # Concurrency mitigation: with no shared lock between this container and
    # onedrive-nas, an rclone sync and a restic backup/prune can now overlap.
    # Capping this container's RAM means a worst-case overlap OOM-kills only
    # backrest (auto-recovered by restart: unless-stopped), not the whole Pi.
    mem_limit: ${BACKREST_MEM_LIMIT:-320m}
    memswap_limit: ${BACKREST_MEM_SWAP_LIMIT:-1280m}
    cpus: ${BACKREST_CPU_LIMIT:-1.0}

    depends_on:
      - onedrive-nas

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
